name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned dependencies (reproducible)
        # Install the exact locked versions, then the package itself without
        # re-resolving — so CI builds the same environment every run.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt
          pip install -e . --no-deps
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest
